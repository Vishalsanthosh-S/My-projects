<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 10px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3498db; border: none; color: white; cursor: pointer; }
        .error { color: #e74c3c; font-size: 0.9em; margin-bottom: 10px; }
        .msg { color: #2ecc71; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>

        {% if messages %}
            {% for message in messages %}
                <p class="{% if message.tags == 'error' %}error{% else %}msg{% endif %}">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        {% if form.errors %}
            <div class="error">
                <p>Login failed. Please check your username and password.</p>
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</body>
</html>
